name: Refresh CIF data snapshot

# Daily unattended refresh after the US close. Fetches prices and corporate
# actions from Alpaca, recomputes the index, and commits the snapshot the
# Streamlit dashboard reads. No API keys are needed at view time.

on:
  schedule:
    # 22:15 UTC on weekdays (~5:15pm ET, after the close). Adjust as needed.
    - cron: "15 22 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh snapshot
        env:
          ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_API_SECRET_KEY: ${{ secrets.ALPACA_API_SECRET_KEY }}
          # Optional: set to "sip" if the repo has a paid Alpaca subscription.
          CIF_FEED: ${{ vars.CIF_FEED }}
          # "equal" until shares.csv is populated; unset/"cap" for cap-weight.
          CIF_WEIGHTING: ${{ vars.CIF_WEIGHTING }}
        run: |
          python src/refresh_data.py

      - name: Commit snapshot if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data_snapshot
          if git diff --cached --quiet; then
            echo "No snapshot changes."
          else
            git commit -m "Automated data snapshot refresh"
            git push
          fi
